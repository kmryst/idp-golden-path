# 本番構成（ECS Fargate 上で app-config.yaml とマージして読み込む）
# 設計判断は docs/adr/0009-production-deployment-on-ecs-fargate.md を参照。
# 環境変数は Terraform（terraform/ephemeral/ecs.tf）が Secrets Manager / リソース属性から注入する。

app:
  baseUrl: https://idp-golden-path.click

backend:
  baseUrl: https://idp-golden-path.click
  listen: ':7007'

  cors:
    origin: https://idp-golden-path.click
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true

  # backend-to-backend 認証鍵。永続層の Secrets Manager から注入し、
  # apply 毎の再生成でトークンが無効化されるのを避ける（ADR 0009）
  auth:
    keys:
      - secret: ${BACKEND_SECRET}

  # Aurora Serverless v2（PostgreSQL 互換）
  # resume（〜15 秒）を見込み、接続タイムアウト / プール取得タイムアウトを長めにする（ADR 0009）
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      ssl:
        ca:
          # コンテナ内では app-config と同じ /app に配置される（Dockerfile 参照）
          $file: rds-global-bundle.pem
    knexConfig:
      acquireConnectionTimeout: 120000
      pool:
        min: 0
        max: 10
        acquireTimeoutMillis: 120000
        createTimeoutMillis: 120000

auth:
  environment: production
  session:
    secret: ${AUTH_SESSION_SECRET}
  providers:
    # 本番では guest を無効化する（null でベース設定のキーごと削除）
    guest: null
    github:
      production:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}
        signIn:
          resolvers:
            # GitHub の username を catalog の User エンティティ名（kmryst）に解決する
            - resolver: usernameMatchingUserEntityName

# TechDocs は builder: external + S3 publisher（ADR 0009。生成は techdocs-cli で行う）
techdocs:
  builder: 'external'
  publisher:
    type: 'awsS3'
    awsS3:
      bucketName: ${TECHDOCS_S3_BUCKET_NAME}
      region: ${AWS_REGION}

catalog:
  # ベース設定（ローカル相対パス + サンプルデータ）を本番用に置き換える。
  # 対象ファイルは Dockerfile でイメージに同梱し、パスは backend の作業ディレクトリ /app 起点。
  locations:
    # 組織エンティティ（User / Group）。GitHub OAuth のサインイン解決に必須
    - type: file
      target: ./catalog/org.yaml
      rules:
        - allow: [User, Group]

    # 既存リポジトリの Component / System 登録スタブ（ADR 0004）
    - type: file
      target: ./catalog/portfolio.yaml

    # このリポジトリ自身（TechDocs 対象）
    - type: file
      target: ./catalog-info.yaml

    # ゴールデンパステンプレート（ADR 0006）
    - type: file
      target: ./templates/service-baseline/template.yaml
      rules:
        - allow: [Template]
