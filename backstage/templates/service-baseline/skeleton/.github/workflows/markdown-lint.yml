# Markdown Lint
# 目的: ドキュメントの品質を required status check として担保する
# 実体は kmryst/idp-golden-path の reusable workflow（タグ固定参照、idp-golden-path ADR-0008）。
# チェックロジックの正本は idp-golden-path 側にあり、更新は Dependabot のタグバージョンアップ PR で取り込む
# required status check の名称は `<caller job name> / <called job name>`
# （例: `Markdown Lint / Markdown Lint`）になる点に注意する

name: Markdown Lint

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: markdown-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  markdown-lint:
    name: Markdown Lint
    uses: kmryst/idp-golden-path/.github/workflows/markdown-lint.yml@v1
    permissions:
      contents: read
