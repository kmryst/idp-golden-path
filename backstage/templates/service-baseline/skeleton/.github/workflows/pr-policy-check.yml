# PR Policy Check
# 目的: CONTRIBUTING.md の PR 運用規約（必須ラベル・Issue リンク・厳密運用 PR のロールバック欄）を CI で検証する
# 実体は kmryst/idp-golden-path の reusable workflow（タグ固定参照、idp-golden-path ADR-0008）。
# チェックロジックの正本は idp-golden-path 側にあり、更新は Dependabot のタグバージョンアップ PR で取り込む
# required status check の名称は `PR Policy Check / PR Policy Check` になる点に注意する
# 厳密運用 path を本リポジトリの CONTRIBUTING.md 定義に合わせて変える場合は
# `with: strict-paths-regex` で上書きする（未指定時: ^(\.github/workflows/|scripts/github/|terraform/)）

name: PR Policy Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pr-policy-check-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックし得るため cancel しない。
  cancel-in-progress: false
  # デフォルト（queue: single）は pending run を1つしか保持せず、labeled/unlabeled 連発時に
  # 古い pending run が cancel されて required check が一時的に expected 扱いになるため、
  # pending run を cancel せず FIFO で順次実行する（Issue #87）。
  # reusable workflow の呼び出し元でもこの concurrency 設定が run のキュー制御に効くため、
  # caller 側（本ファイル）にも同じ設定を入れる。
  queue: max

jobs:
  pr-policy-check:
    name: PR Policy Check
    if: github.actor != 'dependabot[bot]'
    uses: kmryst/idp-golden-path/.github/workflows/pr-policy-check.yml@v1
    permissions:
      contents: read
      pull-requests: read
