# Commitlint
# 目的: CONTRIBUTING.md の Conventional Commits 規約をコミットメッセージと PR タイトルの両方で検証する
# 実体は kmryst/idp-golden-path の reusable workflow（タグ固定参照、idp-golden-path ADR-0008）。
# チェックロジックの正本は idp-golden-path 側にあり、更新は Dependabot のタグバージョンアップ PR で取り込む
# required status check の名称は `commitlint / Commitlint` になる
# （caller job の名前は job id にフォールバックさせている。理由は下記 jobs 参照）

name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read

concurrency:
  # callee（idp-golden-path 側の reusable workflow）も同名パターンの concurrency group を
  # 持つため、caller 側と同一名にすると GitHub Actions が「caller と callee 間のデッドロック」
  # と判定し job を1つも起動せず run をキャンセルする（Issue #106）。
  # `-caller` サフィックスで区別する。
  group: commitlint-caller-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックし得るため cancel しない。
  cancel-in-progress: false

jobs:
  # caller job には name を付けない。job id（commitlint）にフォールバックさせることで、
  # callee側 job 名（Commitlint）との完全な文字列重複（`Commitlint / Commitlint`）を避ける。
  # 重複した表示はコピペミスに見え可読性を損なう（Issue #106）。
  commitlint:
    # Dependabot の免除判定は called workflow の step で行う。caller workflow は常に呼び出し、
    # required status check の `<caller job id> / <called job name>` を作成させる。
    uses: kmryst/idp-golden-path/.github/workflows/pr-commitlint.yml@v1
    permissions:
      contents: read
