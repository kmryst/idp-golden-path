# Commitlint
# 目的: CONTRIBUTING.md の Conventional Commits 規約をコミットメッセージと PR タイトルの両方で検証する
# 移植元: kmryst/terraform-hannibal / kmryst/ticket-c2c-platform の pr-commitlint.yml
# workflow name は required status check（job name）と揃える

name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックし得るため cancel しない。
  cancel-in-progress: false

jobs:
  commitlint:
    name: Commitlint
    # Dependabot の PR タイトルは可変長で header-max-length に抵触し得る。
    # フォーマットは Dependabot 側が決定的に生成するため規約強制の対象外とする。
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm

      - name: Lint PR commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run commitlint -- --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Lint PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npm run commitlint -- --verbose
