# Commitlint
# 目的: CONTRIBUTING.md の Conventional Commits 規約をコミットメッセージと PR タイトルの両方で検証する
# 実体は kmryst/idp-golden-path の reusable workflow（タグ固定参照、idp-golden-path ADR-0008）。
# チェックロジックの正本は idp-golden-path 側にあり、更新は Dependabot のタグバージョンアップ PR で取り込む
# required status check の名称は `Commitlint / Commitlint` になる点に注意する

name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: commitlint-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックし得るため cancel しない。
  cancel-in-progress: false

jobs:
  commitlint:
    name: Commitlint
    # Dependabot の PR タイトルは可変長で header-max-length に抵触し得る。
    # フォーマットは Dependabot 側が決定的に生成するため規約強制の対象外とする。
    if: github.actor != 'dependabot[bot]'
    uses: kmryst/idp-golden-path/.github/workflows/pr-commitlint.yml@v1
    permissions:
      contents: read
