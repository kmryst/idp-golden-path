# Setup Node.js + npm ci の共通 composite action
# 目的: markdown-lint.yml / pr-commitlint.yml で重複していたセットアップ手順を一元化する
# 注意: ローカル action の解決には checkout 済みであることが必要なため、
#       actions/checkout は呼び出し側 workflow に残す
name: Setup Node.js and install npm dependencies
description: Set up Node.js with npm cache and run npm ci

inputs:
  node-version:
    description: Node.js version to set up
    required: false
    default: "24"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci
      shell: bash
