# Issue Template Check
# 目的: Issue 本文の必須見出し（目的 / 対象 / 受け入れ条件）と必須 4 ラベル
# （type:* ちょうど1つ / area:* 1つ以上 / risk:* ちょうど1つ / cost:* ちょうど1つ）を検証し、
# フォーム回答からのラベル自動補正・不備コメント投稿を行う
# このファイルは本リポジトリの Issue 検証であると同時に、他リポジトリから
# `uses: kmryst/idp-golden-path/.github/workflows/issue-template-check.yml@v1` で呼び出す
# reusable workflow でもある（バージョニング方針は ADR-0008）
# 呼び出し側リポジトリの前提: issues イベント（opened / edited / labeled / unlabeled）で呼び出すこと。
# workflow_call でも github.event.issue は呼び出し元のイベントコンテキストを引き継ぐ

name: Issue Template Check

on:
  issues:
    types: [opened, edited, labeled, unlabeled]
  workflow_call:

permissions:
  issues: write
  contents: read

# opened / edited / labeled / unlabeled が短時間に並行実行されると、古い payload の run が
# 後勝ちしてコメントの二重作成やラベルのフラッピングを起こし得るため、Issue 番号単位で直列化する。
# 実行中 run を cancel すると「ラベル付与後・コメント投稿前」のような中途半端な状態で
# 止まり得るため cancel しない（後続 run は完了を待って実行される）。
# github.run_id は issue コンテキストが取れない場合のフォールバック（run 単位で実質 no-op）
#
# 訂正（2026-07-13、Issue #106）: 当初「workflow_call 経由の場合、reusable workflow 側の
# workflow レベル concurrency は適用されず、呼び出し元 caller の concurrency が使われる」と
# 記載していたが、これは誤りだった。実際には GitHub Actions は workflow_call 経由でも
# caller/callee 双方の concurrency group を評価する。そのため消費側リポジトリの caller
# workflow は、この group と同一の文字列を使ってはならない。同一名にすると「caller と
# callee 間のデッドロック」と判定され、job が1つも起動せず run がキャンセルされる
# （ticket-c2c-platform PR #299 で実測）。caller 側は
# `issue-template-check-caller-<Issue番号>` のように区別すること
# （service-baseline skeleton の caller workflow を参照）。
concurrency:
  group: issue-template-check-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  issue-template-check:
    name: Issue Template Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate issue body
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- issue-template-check -->';
            const issue = context.payload.issue;
            const body = issue.body || '';
            const labels = issue.labels.map((label) => label.name);
            const managedPrefixes = ['type:', 'area:', 'risk:', 'cost:'];

            const hasHeading = (heading) =>
              body.includes(`## ${heading}`) || body.includes(`### ${heading}`);

            const escapeRegExp = (value) =>
              value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            const getSectionContent = (heading) => {
              const escapedHeading = escapeRegExp(heading);
              const pattern = new RegExp(
                `(?:^|\\n)#{2,3}\\s+${escapedHeading}\\s*\\n([\\s\\S]*?)(?=\\n#{2,3}\\s+\\S|$)`
              );
              const match = body.match(pattern);
              return match ? match[1].trim() : '';
            };

            const extractLabelsFromSection = (heading, prefix) => {
              const content = getSectionContent(heading);
              if (!content) return [];
              const pattern = new RegExp(`\\b${escapeRegExp(prefix)}[a-z0-9-]+\\b`, 'g');
              return [...new Set(content.match(pattern) || [])];
            };

            let effectiveLabels = [...labels];
            const hasFormLabelSections = ['type', 'area', 'risk', 'cost'].every((heading) =>
              hasHeading(heading)
            );

            if (hasFormLabelSections) {
              const desiredManagedLabels = [
                ...extractLabelsFromSection('type', 'type:'),
                ...extractLabelsFromSection('area', 'area:'),
                ...extractLabelsFromSection('risk', 'risk:'),
                ...extractLabelsFromSection('cost', 'cost:'),
              ];

              const currentManagedLabels = effectiveLabels.filter((label) =>
                managedPrefixes.some((prefix) => label.startsWith(prefix))
              );

              const labelsToAdd = desiredManagedLabels.filter((label) => !effectiveLabels.includes(label));
              const labelsToRemove = currentManagedLabels.filter(
                (label) => !desiredManagedLabels.includes(label)
              );

              if (labelsToAdd.length > 0) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: labelsToAdd,
                });
              }

              for (const label of labelsToRemove) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: label,
                  });
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }

              effectiveLabels = effectiveLabels
                .filter((label) => !labelsToRemove.includes(label))
                .concat(labelsToAdd.filter((label) => !effectiveLabels.includes(label)));
            }

            const requiredHeadings = ['目的', '対象', '受け入れ条件'];
            const missingHeadings = requiredHeadings.filter((heading) => !hasHeading(heading));
            const emptyHeadings = requiredHeadings.filter(
              (heading) => hasHeading(heading) && getSectionContent(heading).length === 0
            );

            const countByPrefix = (prefix) =>
              effectiveLabels.filter((label) => label.startsWith(prefix)).length;

            const typeCount = countByPrefix('type:');
            const areaCount = countByPrefix('area:');
            const riskCount = countByPrefix('risk:');
            const costCount = countByPrefix('cost:');

            const labelErrors = [];
            if (typeCount !== 1) labelErrors.push('`type:*` をちょうど1つ');
            if (areaCount < 1) labelErrors.push('`area:*` を1つ以上');
            if (riskCount !== 1) labelErrors.push('`risk:*` をちょうど1つ');
            if (costCount !== 1) labelErrors.push('`cost:*` をちょうど1つ');

            const valid =
              missingHeadings.length === 0 &&
              emptyHeadings.length === 0 &&
              labelErrors.length === 0;
            const needsTemplateLabel = 'needs-template';
            const addNeedsTemplateLabel = async () => {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [needsTemplateLabel],
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: needsTemplateLabel,
                  color: 'd93f0b',
                  description: 'Issueテンプレートの必須項目が不足',
                });
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  labels: [needsTemplateLabel],
                });
              }
            };

            if (valid) {
              if (effectiveLabels.includes(needsTemplateLabel)) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: needsTemplateLabel,
                  });
                } catch (error) {
                  if (error.status !== 404) {
                    throw error;
                  }
                }
              }
              core.info('Issue body matches the required template headings.');
              return;
            }

            await addNeedsTemplateLabel();

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const alreadyCommented = comments.some((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            const commentBody = [
              marker,
              '## 要修正',
              '',
              'このIssueは次を修正すると通ります:',
              '',
              ...(missingHeadings.length > 0
                ? missingHeadings.map((heading) => `- 見出し不足: \`${heading}\``)
                : []),
              ...(emptyHeadings.length > 0
                ? emptyHeadings.map((heading) => `- 中身が空: \`${heading}\``)
                : []),
              ...(labelErrors.length > 0
                ? labelErrors.map((error) => `- ラベル不足: ${error}`)
                : []),
              '',
              '## 必要条件',
              '- 本文には `目的` `対象` `受け入れ条件` を含める',
              '- 各項目には見出しだけでなく中身も書く',
              '- `type:*` をちょうど1つ',
              '- `area:*` を1つ以上',
              '- `risk:*` をちょうど1つ',
              '- `cost:*` をちょうど1つ',
              '',
              'Web UI から起票する場合は `.github/ISSUE_TEMPLATE/feature_request.yml` のフォーム回答から `type / area / risk / cost` を同期します。',
              '',
              'CLI や AI Agent から起票する場合は `./scripts/github/create-issue-with-labels.sh` を使うと、作成時点で必須ラベルを付けられます。',
              '',
              'AIで下書きした場合も、人間が内容を確認してテンプレート形式に整えてから次工程へ進めてください。',
            ].join('\n');

            if (!alreadyCommented) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody,
              });
            } else {
              const existingComment = comments.find((comment) =>
                comment.user.type === 'Bot' && comment.body.includes(marker)
              );
              if (existingComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existingComment.id,
                  body: commentBody,
                });
              }
            }

            core.setFailed(
              [
                missingHeadings.length > 0
                  ? `Issue body is missing required headings: ${missingHeadings.join(', ')}`
                  : null,
                emptyHeadings.length > 0
                  ? `Issue body sections must not be empty: ${emptyHeadings.join(', ')}`
                  : null,
                labelErrors.length > 0
                  ? `Issue labels must include ${labelErrors.join(', ')}. Use the Web UI form or ./scripts/github/create-issue-with-labels.sh to create issues with required labels.`
                  : null,
              ]
                .filter(Boolean)
                .join(' / ')
            );
