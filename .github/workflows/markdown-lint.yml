# Markdown Lint
# 目的: ドキュメント中心の現段階で、Markdown の品質を required status check として担保する
# 設定の正本: .markdownlint-cli2.jsonc
# このファイルは本リポジトリの PR チェックであると同時に、他リポジトリから
# `uses: kmryst/idp-golden-path/.github/workflows/markdown-lint.yml@v1` で呼び出す
# reusable workflow でもある（バージョニング方針は ADR-0008）
# 呼び出し側リポジトリの前提: package.json に `lint:md` script と markdownlint 設定があること

name: Markdown Lint

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      node-version:
        description: セットアップする Node.js のバージョン（未指定時は 24）
        required: false
        type: string

permissions:
  contents: read

concurrency:
  # 消費側リポジトリの caller workflow は、この group と同一の文字列を使ってはならない。
  # GitHub Actions は workflow_call 経由でも caller/callee 双方の concurrency group を
  # 評価するため、同一名にすると「caller と callee 間のデッドロック」と判定され、
  # job が1つも起動せず run がキャンセルされる
  # （ticket-c2c-platform PR #299 で実測。ADR-0008 追記・Issue #106参照）。
  # caller 側は `markdown-lint-caller-<PR番号>` のように区別すること
  # （service-baseline skeleton の caller workflow を参照）。
  group: markdown-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # reusable workflow として呼び出し側リポジトリを checkout して動くため、
      # 本リポジトリのローカル composite action には依存せずインライン化している
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version || '24' }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run markdownlint
        run: npm run lint:md
