# Commitlint
# 目的: CONTRIBUTING.md の Conventional Commits 規約をコミットメッセージと PR タイトルの両方で検証する
# 移植元: kmryst/terraform-hannibal / kmryst/ticket-c2c-platform の pr-commitlint.yml
# workflow name は required status check（job name）と揃える
# このファイルは本リポジトリの PR チェックであると同時に、他リポジトリから
# `uses: kmryst/idp-golden-path/.github/workflows/pr-commitlint.yml@v1` で呼び出す
# reusable workflow でもある（バージョニング方針は ADR-0008）
# 呼び出し側リポジトリの前提: package.json に `commitlint` script と commitlint 設定があること
# workflow_call の caller は pull_request イベントから呼び出すこと

name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches: [main]
  workflow_call:
    inputs:
      node-version:
        description: セットアップする Node.js のバージョン（未指定時は 24）
        required: false
        type: string

permissions:
  contents: read

concurrency:
  # 消費側リポジトリの caller workflow は、この group と同一の文字列を使ってはならない。
  # GitHub Actions は workflow_call 経由でも caller/callee 双方の concurrency group を
  # 評価するため、同一名にすると「caller と callee 間のデッドロック」と判定され、
  # job が1つも起動せず run がキャンセルされる
  # （ticket-c2c-platform PR #299 で実測。ADR-0008 追記・Issue #106参照）。
  # caller 側は `commitlint-caller-<PR番号>` のように区別すること
  # （service-baseline skeleton の caller workflow を参照）。
  group: commitlint-${{ github.event.pull_request.number }}
  # 実行中 run のキャンセルは CANCELLED check run を commit に残し、
  # required status checks の判定に混入して PR を恒久的にブロックし得るため cancel しない。
  cancel-in-progress: false

jobs:
  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    steps:
      # Dependabot が決定する PR タイトルは header-max-length に抵触し得るため、規約強制の対象外とする。
      - name: Record Dependabot exemption
        if: github.event.pull_request.user.login == 'dependabot[bot]'
        run: echo "Commitlint is exempt for Dependabot-authored pull requests."

      - name: Checkout code
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # reusable workflow として呼び出し側リポジトリを checkout して動くため、
      # 本リポジトリのローカル composite action には依存せずインライン化している
      - name: Setup Node.js
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node-version || '24' }}
          cache: 'npm'

      - name: Install dependencies
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: npm ci

      - name: Lint PR commits
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npm run commitlint -- --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Lint PR title
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s\n' "$PR_TITLE" | npm run commitlint -- --verbose
