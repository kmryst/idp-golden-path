# Gitleaks Secret Scan
# 目的: git 履歴への secret / credential 混入を required status check として検出する
# 移植元: kmryst/terraform-hannibal の Gitleaks Secret Scan（設定は default config を使用）
# workflow name は required status check（job name）と揃える
# このファイルは本リポジトリの PR チェックであると同時に、他リポジトリから
# `uses: kmryst/idp-golden-path/.github/workflows/security-scan.yml@v1` で呼び出す
# reusable workflow でもある（バージョニング方針は ADR-0008）

name: Gitleaks Secret Scan

on:
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      gitleaks-version:
        description: インストールする Gitleaks のバージョン（未指定時は 8.30.1）
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: ${{ inputs.gitleaks-version || '8.30.1' }}
        run: |
          ASSET="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${ASSET}" -o "${ASSET}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          sha256sum -c <(grep " ${ASSET}\$" checksums.txt)
          tar -xzf "${ASSET}" gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm "${ASSET}" checksums.txt
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks git --no-banner --redact

      - name: Write Gitleaks summary
        if: success()
        run: |
          {
            echo "## Gitleaks Secret Scan"
            echo ""
            echo "No secrets were detected in the scanned git history."
          } >> "$GITHUB_STEP_SUMMARY"
