# Security Scan
# 目的: git 履歴への secret / credential 混入を required status check として検出する
# 移植元: kmryst/terraform-hannibal の Gitleaks Secret Scan（設定は default config を使用）

name: Security Scan

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tar.gz
          gitleaks version

      - name: Run Gitleaks
        run: gitleaks git --no-banner --redact

      - name: Write Gitleaks summary
        if: success()
        run: |
          {
            echo "## Gitleaks Secret Scan"
            echo ""
            echo "No secrets were detected in the scanned git history."
          } >> "$GITHUB_STEP_SUMMARY"
